<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워터 소트 퍼즐</title>
<style>
  :root{
    --bg:#0f1620;
    --bg2:#141d29;
    --glass:#1c2733;
    --glass-edge:#33455a;
    --accent:#5ec8d8;
    --text:#e8eef2;
    --sub:#8fa3b3;
    --danger:#e6616a;
  }
  *{box-sizing:border-box;}
  html, body{
    overflow:hidden;
    height:100%;
    overscroll-behavior:none;
    touch-action:none;
  }
  body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top, var(--bg2), var(--bg));
    font-family:'Segoe UI', 'Malgun Gothic', sans-serif;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 12px 60px;
  }
  h1{
    font-size:22px;
    letter-spacing:2px;
    margin:0 0 16px;
    color:var(--accent);
  }
  .hud{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:nowrap;
    justify-content:center;
    max-width:100vw;
  }
  .icon-btn{
    width:40px;
    height:40px;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  @media (max-width:420px){
    .hud{ gap:6px; }
    .badge{ padding:6px 8px; font-size:12px; gap:4px; }
    .icon-btn{ width:34px; height:34px; font-size:15px; }
    #tutorialBtn{ padding:0 8px; font-size:15px; }
  }
  #undoBtn{
    font-size:28px;
    color:var(--text);
  }
  #resetBtn{
    font-size:20px;
    color:var(--text);
  }
  .badge{
    background:var(--glass);
    border:1px solid var(--glass-edge);
    border-radius:10px;
    padding:8px 14px;
    font-size:14px;
    display:flex;
    gap:6px;
    align-items:center;
  }
  .badge b{ color:var(--accent); }
  button{
    background:var(--glass);
    border:1px solid var(--glass-edge);
    color:var(--text);
    padding:9px 16px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    transition:transform .1s, background .15s;
  }
  button:hover{ background:#26333f; }
  button:active{ transform:scale(0.95); }
  button:disabled{ opacity:0.4; cursor:default; }
  #board{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:22px;
    max-width:820px;
    margin-top:12px;
  }
  #board .tube:nth-child(-n+4){
    position:relative;
    top:-6px;
  }
  .tube{
    width:64px;
    height:200px;
    border:3px solid var(--glass-edge);
    border-top:none;
    border-radius:0 0 18px 18px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
    position:relative;
    display:flex;
    flex-direction:column-reverse;
    padding:4px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .15s;
  }
  .tube::before{
    content:'';
    position:absolute;
    top:-3px; left:-3px; right:-3px;
    height:10px;
    border:3px solid var(--glass-edge);
    border-bottom:none;
    border-radius:6px 6px 0 0;
  }
  .tube.selected{
    transform:translateY(-14px);
    border-color:var(--accent);
    box-shadow:0 0 14px rgba(94,200,216,0.5);
  }
  .tube.shake{
    animation:shake .3s;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }
  .liquid{
    width:100%;
    height:23%;
    border-radius:3px;
    flex-shrink:0;
    border-top:2px solid rgba(0,0,0,0.28);
  }
  #winModal, #overModal{
    position:fixed; inset:0;
    background:rgba(6,10,15,0.75);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .modal-box{
    background:var(--glass);
    border:1px solid var(--glass-edge);
    border-radius:16px;
    padding:28px 32px;
    text-align:center;
    max-width:300px;
  }
  .modal-box h2{ margin-top:0; color:var(--accent); }
  .modal-box p{ color:var(--sub); font-size:14px; }
  .modal-box button{ margin-top:10px; }

  #tutorialBar{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:6px;
    background:rgba(94,200,216,0.08);
    border:1px solid var(--accent);
    border-radius:12px;
    padding:8px 14px;
  }
  #tutorialBtn.active{
    background:var(--accent);
    color:#0f1620;
    border-color:var(--accent);
    font-weight:bold;
  }
  #tutNextBtn, #tutBackBtn{
    font-size:20px;
    color:var(--text);
  }
  #tutNextBtn:not(:disabled):hover, #tutBackBtn:not(:disabled):hover{
    background:var(--accent);
    color:#0f1620;
  }
  .tube.tut-src{
    border-color:#f2d144;
    box-shadow:0 0 16px rgba(242,209,68,0.7);
    transform:translateY(-14px);
  }
  .tube.tut-dst{
    border-color:#2a9d8f;
    box-shadow:0 0 16px rgba(42,157,143,0.7);
  }
</style>
</head>
<body>

<h1>💧 워터 소트 퍼즐</h1>

<div class="hud">
  <div class="badge">클리어 <b id="levelLabel">1</b></div>
  <div class="badge">이동 <b id="moveLabel">0</b></div>
  <button id="undoBtn" class="icon-btn" title="한 칸 되돌리기">↩︎</button>
  <button id="resetBtn" class="icon-btn" title="이번 판 초기화">⟲</button>
  <button id="restartBtn" class="icon-btn" title="새 판">🔄</button>
  <button id="tutorialBtn" title="튜토리얼 모드">🎓</button>
</div>

<div id="tutorialBar" style="display:none;">
  <div class="badge">튜토리얼 <b id="tutStepLabel">0</b> / <b id="tutTotalLabel">0</b></div>
  <button id="tutBackBtn" class="icon-btn" title="한 칸 뒤로">◀</button>
  <button id="tutNextBtn" class="icon-btn" title="한 칸 가기">▶</button>
  <button id="tutExitBtn" title="튜토리얼 종료">종료</button>
</div>

<div id="board"></div>

<div id="winModal">
  <div class="modal-box">
    <h2>🎉 클리어!</h2>
    <p id="winText">클리어했습니다.</p>
    <button id="nextLevelBtn">다음 판</button>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'watersort_progress_v1';
  const PALETTE = ['#e63946','#f4a261','#f2d144','#2a9d8f','#3a6ea5','#9b5de5']; // 6가지 색

  // ===== 효과음 (Web Audio API 합성 - 외부 파일 없이 동작) =====
  let audioCtx = null;
  function getCtx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // 1) 물 붓는 소리 - 노이즈 + 대역통과 필터로 '쪼르륵' 느낌
  function playPourSound(){
    const ctx = getCtx();
    const dur = 0.28;
    const bufLen = Math.floor(ctx.sampleRate * dur);
    const buffer = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i] = (Math.random()*2-1);

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(1800, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + dur);
    filter.Q.value = 1.2;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);

    noise.connect(filter).connect(gain).connect(ctx.destination);
    noise.start();
    noise.stop(ctx.currentTime + dur);
  }

  // 2) 병 하나 채우기 완료 - 맑은 벨소리
  function playFillSound(){
    const ctx = getCtx();
    const now = ctx.currentTime;
    [880, 1318.5].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const gain = ctx.createGain();
      const start = now + i*0.05;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.3, start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    });
  }

  // 3) 클리어 - 상승하는 짧은 팡파레
  function playClearSound(){
    const ctx = getCtx();
    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const gain = ctx.createGain();
      const start = now + i*0.11;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.32, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.45);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + 0.5);
    });
  }

  let state = {
    level: 1,
    capacity: 4,
    tubes: [],
    initial: [],
    selected: -1,
    moves: 0,
    history: []
  };

  // ===== 튜토리얼 모드 =====
  let tutorial = {
    active: false,
    solution: [],   // [{from, to}, ...] 지금 상태부터 클리어까지의 남은 최적 수순
    step: 0         // 지금까지 실행한 수의 개수
  };

  // 최단 해법 탐색 (BFS). 상태 하나당 이전 상태로 가는 이동 정보를 저장해 경로를 복원한다.
  function solvePuzzle(tubes, cap, maxStates){
    if(isTubesDone(tubes, cap)) return [];
    const startKey = tubeStateKey(tubes);
    const visited = new Map();
    visited.set(startKey, null);
    let frontier = [tubes];
    let explored = 0;
    while(frontier.length && explored < maxStates){
      const next = [];
      for(const cur of frontier){
        const curKey = tubeStateKey(cur);
        const n = cur.length;
        for(let i=0;i<n;i++){
          if(cur[i].length===0) continue;
          for(let j=0;j<n;j++){
            if(i===j) continue;
            const s = cur[i], d = cur[j];
            if(d.length >= cap) continue;
            const sc = s[s.length-1];
            const dc = d.length ? d[d.length-1] : null;
            if(dc !== null && dc !== sc) continue;
            if(dc === null && d.length === 0 && s.every(c => c === sc)) continue;
            let count = 0;
            for(let k=s.length-1;k>=0;k--){ if(s[k]===sc) count++; else break; }
            const amt = Math.min(count, cap-d.length);
            if(amt<=0) continue;
            const ns = cur.map(t => t.slice());
            for(let k=0;k<amt;k++){ ns[j].push(ns[i].pop()); }
            const key = tubeStateKey(ns);
            if(visited.has(key)) continue;
            visited.set(key, { prevKey: curKey, from:i, to:j });
            if(isTubesDone(ns, cap)){
              const path = [];
              let ck = key;
              while(visited.get(ck)){
                const info = visited.get(ck);
                path.push({from: info.from, to: info.to});
                ck = info.prevKey;
              }
              path.reverse();
              return path;
            }
            next.push(ns);
            explored++;
            if(explored >= maxStates) break;
          }
          if(explored >= maxStates) break;
        }
        if(explored >= maxStates) break;
      }
      frontier = next;
    }
    return null;
  }

  function ensureTutorialSolution(){
    const path = solvePuzzle(cloneTubes(state.tubes), state.capacity, 60000);
    tutorial.solution = path || [];
    tutorial.step = 0;
  }

  function toggleTutorial(){
    tutorial.active = !tutorial.active;
    const btn = document.getElementById('tutorialBtn');
    const bar = document.getElementById('tutorialBar');
    if(tutorial.active){
      btn.classList.add('active');
      bar.style.display = 'flex';
      ensureTutorialSolution();
    } else {
      btn.classList.remove('active');
      bar.style.display = 'none';
    }
    render();
  }

  function clearTutorialHighlight(){
    document.querySelectorAll('.tube.tut-src, .tube.tut-dst').forEach(el=>{
      el.classList.remove('tut-src','tut-dst');
    });
  }

  function renderTutorialBar(){
    if(!tutorial.active) return;
    document.getElementById('tutStepLabel').textContent = tutorial.step;
    document.getElementById('tutTotalLabel').textContent = tutorial.solution.length;
    document.getElementById('tutNextBtn').disabled = tutorial.step >= tutorial.solution.length;
    document.getElementById('tutBackBtn').disabled = tutorial.step <= 0;

    clearTutorialHighlight();
    if(tutorial.step < tutorial.solution.length){
      const mv = tutorial.solution[tutorial.step];
      const srcEl = document.querySelector('.tube[data-idx="'+mv.from+'"]');
      const dstEl = document.querySelector('.tube[data-idx="'+mv.to+'"]');
      if(srcEl) srcEl.classList.add('tut-src');
      if(dstEl) dstEl.classList.add('tut-dst');
    }
  }

  function tutorialNext(){
    if(!tutorial.active) return;
    if(tutorial.step >= tutorial.solution.length) return;
    const mv = tutorial.solution[tutorial.step];
    if(!canPour(mv.from, mv.to)){
      ensureTutorialSolution();
      if(tutorial.solution.length === 0) { render(); return; }
      return tutorialNext();
    }
    doPour(mv.from, mv.to, true);
    state.moves++;
    tutorial.step++;
    playPourSound();
    const filledTube = state.tubes[mv.to];
    const isFilled = filledTube.length === state.capacity && filledTube.every(c => c === filledTube[0]);
    if(isFilled) setTimeout(playFillSound, 180);
    render();
    if(isSolved()) onWin();
  }

  function tutorialBack(){
    if(!tutorial.active) return;
    if(tutorial.step <= 0) return;
    if(state.history.length === 0) return;
    state.tubes = state.history.pop();
    state.moves = Math.max(0, state.moves-1);
    tutorial.step--;
    render();
  }

  function loadProgress(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const p = JSON.parse(raw);
        state.level = p.level || 1;
      }
    }catch(e){}
  }
  function saveProgress(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({level: state.level}));
    }catch(e){}
  }

  // 병 개수(색깔 6개 + 빈 병 1개)와 병의 용량(6칸)을 항상 동일하게 고정한다.
  // 클리어 횟수가 늘어도 조건은 절대 바뀌지 않는다.
  function levelConfig(level){
    const emptyTubes = 1;
    const capacity = 6;
    const maxStates = 45000;
    return { emptyTubes, capacity, maxStates };
  }

  function cloneTubes(tubes){
    return tubes.map(t => t.slice());
  }

  function topColor(tube){
    return tube.length ? tube[tube.length-1] : null;
  }

  function canPour(src, dst){
    if(src === dst) return false;
    const s = state.tubes[src], d = state.tubes[dst];
    if(s.length === 0) return false;
    if(d.length >= state.capacity) return false;
    const sc = topColor(s);
    const dc = topColor(d);
    if(dc !== null && dc !== sc) return false;
    return true;
  }

  function pourAmount(src, dst){
    const s = state.tubes[src], d = state.tubes[dst];
    const sc = topColor(s);
    let count = 0;
    for(let i = s.length-1; i>=0; i--){
      if(s[i] === sc) count++; else break;
    }
    const space = state.capacity - d.length;
    return Math.min(count, space);
  }

  function doPour(src, dst, recordHistory){
    const amt = pourAmount(src, dst);
    if(amt <= 0) return false;
    if(recordHistory){
      state.history.push(cloneTubes(state.tubes));
      if(state.history.length > 200) state.history.shift();
    }
    const sc = topColor(state.tubes[src]);
    for(let i=0;i<amt;i++){
      state.tubes[src].pop();
      state.tubes[dst].push(sc);
    }
    return true;
  }

  function isSolved(){
    const cap = state.capacity;
    return state.tubes.every(t => t.length === 0 || (t.length === cap && t.every(c => c === t[0])));
  }

  function tubeStateKey(tubes){
    return tubes.map(t => t.join(',')).join('|');
  }

  function isTubesDone(tubes, cap){
    return tubes.every(t => t.length===0 || (t.length===cap && t.every(c=>c===t[0])));
  }

  // 주어진 배치가 실제로 풀 수 있는지 BFS로 검증 (탐색 상한을 둬서 무거워지지 않게 함)
  function isSolvable(tubes, cap, maxStates){
    if(isTubesDone(tubes, cap)) return true;
    const visited = new Set([tubeStateKey(tubes)]);
    let frontier = [tubes];
    let explored = 0;
    while(frontier.length && explored < maxStates){
      const next = [];
      for(const cur of frontier){
        const n = cur.length;
        for(let i=0;i<n;i++){
          if(cur[i].length===0) continue;
          for(let j=0;j<n;j++){
            if(i===j) continue;
            const s = cur[i], d = cur[j];
            if(d.length >= cap) continue;
            const sc = s[s.length-1];
            const dc = d.length ? d[d.length-1] : null;
            if(dc !== null && dc !== sc) continue;
            // 꽉 찬 단색 병을 빈 병으로 그대로 옮기는 무의미한 수는 건너뛴다
            if(dc === null && d.length === 0 && s.every(c => c === sc)) continue;
            let count = 0;
            for(let k=s.length-1;k>=0;k--){ if(s[k]===sc) count++; else break; }
            const amt = Math.min(count, cap-d.length);
            if(amt<=0) continue;
            const ns = cur.map(t => t.slice());
            for(let k=0;k<amt;k++){ ns[j].push(ns[i].pop()); }
            if(isTubesDone(ns, cap)) return true;
            const key = tubeStateKey(ns);
            if(visited.has(key)) continue;
            visited.add(key);
            next.push(ns);
            explored++;
            if(explored >= maxStates) break;
          }
          if(explored >= maxStates) break;
        }
        if(explored >= maxStates) break;
      }
      frontier = next;
    }
    return false;
  }

  function randomTubes(cap, emptyTubes){
    const colors = PALETTE.slice(0, 6);
    let units = [];
    colors.forEach(c => { for(let i=0;i<cap;i++) units.push(c); });
    for(let i=units.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [units[i], units[j]] = [units[j], units[i]];
    }
    let tubes = [];
    for(let i=0;i<colors.length;i++){
      tubes.push(units.slice(i*cap, i*cap+cap));
    }
    for(let i=0;i<emptyTubes;i++) tubes.push([]);
    return tubes;
  }

  function generatePuzzle(level){
    const { emptyTubes, capacity, maxStates } = levelConfig(level);

    for(let attempt=0; attempt<400; attempt++){
      const tubes = randomTubes(capacity, emptyTubes);
      if(isTubesDone(tubes, capacity)) continue;
      if(isSolvable(tubes, capacity, maxStates)) return { tubes, capacity };
    }
    // 400번 안에 못 찾으면 빈 병을 하나씩 늘려가며 반드시 풀리는 배치를 찾을 때까지 재시도
    let extraEmpty = emptyTubes + 1;
    while(true){
      for(let attempt=0; attempt<400; attempt++){
        const tubes = randomTubes(capacity, extraEmpty);
        if(isTubesDone(tubes, capacity)) continue;
        if(isSolvable(tubes, capacity, maxStates)) return { tubes, capacity };
      }
      extraEmpty++;
    }
  }

  function newLevel(level){
    const { tubes, capacity } = generatePuzzle(level);
    state.level = level;
    state.capacity = capacity;
    state.tubes = tubes;
    state.initial = cloneTubes(tubes);
    state.selected = -1;
    state.moves = 0;
    state.history = [];
    saveProgress();
    if(tutorial.active) ensureTutorialSolution();
    render();
  }

  function render(){
    document.getElementById('levelLabel').textContent = state.level;
    document.getElementById('moveLabel').textContent = state.moves;
    document.getElementById('undoBtn').disabled = state.history.length === 0;

    const board = document.getElementById('board');
    board.innerHTML = '';
    const segH = (100 / state.capacity).toFixed(2) + '%';
    state.tubes.forEach((tube, idx) => {
      const div = document.createElement('div');
      div.className = 'tube' + (state.selected===idx ? ' selected' : '');
      div.dataset.idx = idx;
      tube.forEach(color => {
        const liq = document.createElement('div');
        liq.className = 'liquid';
        liq.style.background = color;
        liq.style.height = segH;
        div.appendChild(liq);
      });
      div.addEventListener('click', () => onTubeClick(idx));
      board.appendChild(div);
    });
    renderTutorialBar();
  }

  function onTubeClick(idx){
    if(state.selected === -1){
      if(state.tubes[idx].length === 0) return;
      state.selected = idx;
      render();
      return;
    }
    if(state.selected === idx){
      state.selected = -1;
      render();
      return;
    }
    if(canPour(state.selected, idx)){
      doPour(state.selected, idx, true);
      state.moves++;
      playPourSound();
      const filledTube = state.tubes[idx];
      const isFilled = filledTube.length === state.capacity && filledTube.every(c => c === filledTube[0]);
      if(isFilled) setTimeout(playFillSound, 180);
      state.selected = -1;
      if(tutorial.active) ensureTutorialSolution(); // 직접 조작한 경우 남은 최적 경로를 다시 계산
      render();
      if(isSolved()) onWin();
    } else {
      const el = document.querySelector('.tube[data-idx="'+idx+'"]');
      if(el){
        el.classList.add('shake');
        setTimeout(()=>el.classList.remove('shake'), 300);
      }
      state.selected = -1;
      render();
    }
  }

  function onWin(){
    playClearSound();
    document.getElementById('winText').textContent =
      state.level + '번째 클리어! (이동 ' + state.moves + '회)';
    document.getElementById('winModal').style.display = 'flex';
  }

  document.getElementById('nextLevelBtn').addEventListener('click', () => {
    document.getElementById('winModal').style.display = 'none';
    if(tutorial.active){
      newLevel(state.level);
    } else {
      newLevel(state.level + 1);
    }
  });

  document.getElementById('undoBtn').addEventListener('click', () => {
    if(state.history.length === 0) return;
    state.tubes = state.history.pop();
    state.selected = -1;
    state.moves = Math.max(0, state.moves-1);
    if(tutorial.active) ensureTutorialSolution();
    render();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    state.tubes = cloneTubes(state.initial);
    state.selected = -1;
    state.moves = 0;
    state.history = [];
    if(tutorial.active) ensureTutorialSolution();
    render();
  });

  document.getElementById('restartBtn').addEventListener('click', () => {
    newLevel(state.level);
  });

  document.getElementById('tutorialBtn').addEventListener('click', toggleTutorial);
  document.getElementById('tutNextBtn').addEventListener('click', tutorialNext);
  document.getElementById('tutBackBtn').addEventListener('click', tutorialBack);
  document.getElementById('tutExitBtn').addEventListener('click', () => {
    if(tutorial.active) toggleTutorial();
  });

  document.body.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });

  loadProgress();
  newLevel(state.level);
})();
</script>

</body>
</html>
